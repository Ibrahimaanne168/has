<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - HAS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="login-container">

    <img src="{{ url_for('static', filename='images/logo_has.jpg') }}" alt="Logo HAS" class="logo">

    <h1>HAS</h1>
    <p>Halil Académie Scientifique</p>

    <form method="POST">

        <div class="input-box">
            <i class="fa-solid fa-user"></i>
            <input type="text" name="login" placeholder="Nom d'utilisateur" required autofocus>
        </div>

        <div class="input-box input-box-password">
            <i class="fa-solid fa-lock"></i>
            <input id="login-password" type="password" name="password" placeholder="Mot de passe" autocomplete="current-password" required>
            <button type="button" class="password-toggle" data-password-toggle="login-password" aria-label="Afficher le mot de passe">
                <i class="fa-solid fa-eye"></i>
            </button>
        </div>

        <div class="form-options">
            <label class="remember-me">
                <input type="checkbox" name="remember">
                Se souvenir de moi
            </label>
            <a href="{{ url_for('public.mot_de_passe_oublie') }}" class="forgot-link">Mot de passe oublié ?</a>
        </div>

        <button type="submit">
            Se connecter
        </button>

    </form>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="message">
                {{ messages[0] }}
            </div>
        {% endif %}
    {% endwith %}

    <div class="login-footer">
        Étudiant, Enseignant ou Administrateur — vous serez redirigé automatiquement vers votre espace après connexion.
    </div>

</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
